<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">ARAGON Smart Inventories</title>

    <!-- INICIO: Codigo de Favicons Corregido y Optimizado -->
     <link rel="icon" type="image/png" href="favicons/apple-touch-icon.png"> 
    <!-- Asegurate que todos estos archivos esten en la carpeta 'public/favicons/' -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest"> <!-- Ruta corregida para el manifest -->
    <link rel="mask-icon" href="favicons/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="favicons/favicon.ico" type="image/x-icon"> <!-- El favicon principal en formato .ico -->
    <!-- FIN: Codigo de Favicons Corregido y Optimizado -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="css/estilo.css">
<link href="/dist/output.css" rel="stylesheet">
</head>
<body class="background-login"> <!-- ¡CLAVE! Añadir esta clase -->
    <header class="bg-white p-4 border-b border-gray-200">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:justify-between md:items-center space-y-3 md:space-y-0">
            
            <div class="flex justify-center md:justify-start">
                <a href="/">
                    <img src="favicons/android-chrome-192x192.png" alt="Logo" class="h-16">
                </a>
            </div>

            <div id="live-clock" class="text-gray-600 text-sm text-center font-medium">
                Cargando hora...
            </div>

            <div class="flex justify-center md:justify-end">
                <div class="language-switcher">
                    <select id="language-switcher" class="p-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none">
                        <option value="en">English</option>
                        <option value="es" selected>Español</option>
                        <option value="pap">Papiamento</option>
                        <option value="zh">中文</option>
                    </select>
                </div>
            </div>

        </div>
    </header>
<main id="app-container" class="main-content">
    </main>
    <div class="contenedor__todo">
            <div class="caja__trasera">
                <div class="caja__trasera-login">
                    <h3 data-i18n="login:already_registered_title">¿Ya estas Registrado?</h3>
                    <p data-i18n="login:already_registered_text">Inicia sesion para Ingresar al Formulario</p>
                    <button id="btn__iniciar-Sesion" data-i18n="login.login_button">Iniciar Sesion</button>
                </div>
                <div class="caja__trasera-register">
                    <h3 data-i18n="login:not_registered_title">¿Aun no estas Registrado?</h3>
                    <p data-i18n="login:not_registered_text">Registrate para que Puedas Ingresar al Formulario</p>
                    <button id="btn__registrarse" data-i18n="login.register_link">Registrarse</button>
                </div>
            </div>
            <div class="contenedor__login-register">
                <form id="login-form" action="/login" method="POST" class="formulario__login">
                    <h2 data-i18n="login:login_title">Iniciar Sesion</h2>
                    <input type="text" placeholder="ID Personal" name="id_personal" required data-i18n="[placeholder]login.username_label"> 
                    <input type="password" placeholder="Contraseña" name="contrasena" required data-i18n="[placeholder]login.password_label">
                    <button type="submit" data-i18n="login:login_button">Ingresar</button>
                </form>
                <div id="mensaje-login" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
                
                <form id="register-form" class="formulario__register" action="/api/registrar-nuevo" method="POST">
    <h2 data-i18n="login:register_link">Registrar Nuevo Empleado</h2>
    
    <input type="text" 
           placeholder="Nombre Completo" 
           name="nombre_real" 
           required 
           data-i18n="[placeholder]login.name_label_placeholder"> 

    <input type="email" 
           placeholder="Correo Electrónico" 
           name="email_usuario" 
           required> 

    <input type="text" 
           placeholder="Nombre de la Empresa" 
           name="nombre_empresa" 
           required> 
    
    <input type="text" 
           placeholder="ID Personal" 
           name="nombre_usuario" 
           required 
           data-i18n="[placeholder]login.username_label"> 
    
    <input type="password" 
           placeholder="Contraseña" 
           name="contrasena" 
           required 
           data-i18n="[placeholder]login.password_label">
    
    <button type="submit" data-i18n="login:register_button">Registrarse</button>
</form>
            </div>
        </div>
    </main>
                <div id="mensaje-registro" style="text-align: center; margin-top: 10px; color: orange;"></div>
            </div>
        </div>
    </main>
    
<script type="importmap">
{
  "imports": {
    "i18next": "https://cdn.jsdelivr.net/npm/i18next@23.11.5/+esm",
    "i18next-http-backend": "https://cdn.jsdelivr.net/npm/i18next-http-backend@2.5.2/+esm",
    "i18next-browser-languagedetector": "https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@8.0.0/+esm",
    "sweetalert2": "https://cdn.jsdelivr.net/npm/sweetalert2@11.10.8/+esm"
  }
}
</script>
    
    <script src="js/i18n.js" type="module"></script>
    <script src="js/script.js" type="module"></script>
    <script src="js/common.js" type="module"></script>
    </body>
</html>
