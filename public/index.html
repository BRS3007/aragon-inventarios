<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">ARAGON Smart Inventories</title>

</head>
<body class="background-login">

    <header class="bg-white p-4 border-b border-gray-200">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:justify-between md:items-center space-y-3 md:space-y-0 text-center md:text-left">
            
            <div class="flex flex-col items-center md:items-start">
                <img src="favicons/android-chrome-192x192.png" alt="Logo" class="h-24 mb-1">
            </div>

            <div class="flex justify-center items-center">
                <div class="text-gray-600 text-xs md:text-sm font-medium bg-gray-50 px-4 py-2 rounded-lg shadow-sm border border-gray-100 max-w-max">
                    <span id="reloj-fecha" class="text-gray-500">domingo, 29 de marzo de 2026</span> 
                    <span id="reloj-hora" class="font-bold text-gray-800 ml-1.5">19:12:28</span>
                </div>
            </div>

            <div class="flex justify-center md:justify-end">
                <div class="language-switcher">
                    <select id="language-switcher" class="p-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none shadow-sm cursor-pointer">
                        <option value="en">English</option>
                        <option value="es" selected>Español</option>
                        <option value="pap">Papiamento</option>
                        <option value="zh">中文</option>
                    </select>
                </div>
            </div>

        </div>
    </header>
<main id="app-container" class="main-content" style="margin-top: 5px; padding-top: 0;">
        
        <div class="contenedor__todo" style="margin-top: 0;">
            
            <div class="caja__trasera">
                <div class="caja__trasera-login">
                    <h3 data-i18n="login:already_registered_title">¿Ya estas Registrado?</h3>
                    <p data-i18n="login:already_registered_text">Inicia sesion para Ingresar al Formulario</p>
                    <button id="btn__iniciar-Sesion" data-i18n="login.login_button">Iniciar Sesion</button>
                </div>
                <div class="caja__trasera-register">
                    <h3 data-i18n="login:not_registered_title">¿Aun no estas Registrado?</h3>
                    <p data-i18n="login:not_registered_text">Registrate para que Puedas Ingresar al Formulario</p>
                    <button id="btn__registrarse" data-i18n="login.register_link">Registrarse</button>
                </div>
            </div>

            <div class="contenedor__login-register">
                
                <form id="login-form" action="/login" method="POST" class="formulario__login">
                    <h2 data-i18n="login:login_title">Iniciar Sesion</h2>
                    <input type="text" placeholder="ID Personal" name="id_personal" required data-i18n="[placeholder]login.username_label"> 
                    <input type="password" placeholder="Contraseña" name="contrasena" required data-i18n="[placeholder]login.password_label">
                    <button type="submit" data-i18n="login:login_button">Ingresar</button>
                </form>
                <div id="mensaje-login" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
                
                <form id="register-form" class="formulario__register" action="/api/registrar-nuevo" method="POST">
                    <h2 data-i18n="login:register_link">Registrar Nuevo Empleado</h2>
                    
                    <input type="text" placeholder="Nombre Completo" name="nombre_real" required data-i18n="[placeholder]login.name_label_placeholder"> 
                    <input type="email" placeholder="Correo Electrónico" name="email_usuario" required> 
                    <input type="text" placeholder="Nombre de la Empresa" name="nombre_empresa" required> 
                    <input type="text" placeholder="ID Personal" name="nombre_usuario" required data-i18n="[placeholder]login.username_label"> 
                    <input type="password" placeholder="Contraseña" name="contrasena" required data-i18n="[placeholder]login.password_label">
                    
                    <button type="submit" data-i18n="login:register_button">Registrarse</button>
                </form>
                
                <div id="mensaje-registro" style="text-align: center; margin-top: 10px; color: orange;"></div>

            </div> </div> </main>

            <script>
    function actualizarReloj() {
        const ahora = new Date();
        
        // 1. Opciones solo para la fecha
        const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const fechaTexto = ahora.toLocaleDateString('es-ES', opcionesFecha).replace(',', '');
        
        // 2. Formato para la hora (HH:MM:SS)
        const horas = String(ahora.getHours()).padStart(2, '0');
        const minutos = String(ahora.getMinutes()).padStart(2, '0');
        const segundos = String(ahora.getSeconds()).padStart(2, '0');
        const horaTexto = `${horas}:${minutos}:${segundos}`;
        
        // 🔥 LA CLAVE: Usamos 'textContent' en lugar de 'innerHTML'. 
        // Esto solo cambia el texto plano y no redibuja la caja. ¡Cero parpadeos!
        document.getElementById('reloj-fecha').textContent = fechaTexto;
        document.getElementById('reloj-hora').textContent = horaTexto;
    }

    // Carga instantánea
    actualizarReloj();
    
    // Se actualiza cada segundo de manera 100% fluida
    setInterval(actualizarReloj, 1000);
</script>
    
<script type="importmap">
{

  }
}
</script>
    
    <script src="js/i18n.js" type="module"></script>
    <script src="js/script.js" type="module"></script>
    <script src="js/common.js" type="module"></script>
    </body>
</html>
