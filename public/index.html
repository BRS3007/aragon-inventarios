<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login:login_title">Iniciar Sesión</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="favicons/android-chrome-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <link rel="mask-icon" href="favicons/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS Unificado -->
    <link rel="stylesheet" href="css/unified.css">
    
    <style>
        /* Estilos específicos para el login */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        .login-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--aragon-red) 0%, var(--aragon-red-dark) 100%);
            padding: 32px;
            text-align: center;
        }
        
        .login-logo {
            height: 80px;
            margin-bottom: 16px;
        }
        
        .login-title {
            color: var(--white);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }
        
        .login-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 8px;
        }
        
        .login-body {
            padding: 32px;
        }
        
        .login-tabs {
            display: flex;
            margin-bottom: 24px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #f1f5f9;
        }
        
        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            background: transparent;
            border: none;
            color: var(--text-gray);
        }
        
        .login-tab.active {
            background: var(--white);
            color: var(--aragon-red);
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        
        .login-form .form-group {
            margin-bottom: 20px;
        }
        
        .login-form input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: var(--transition);
            background: #f9fafb;
        }
        
        .login-form input:focus {
            border-color: var(--aragon-red);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--aragon-red-glow);
            outline: none;
        }
        
        .login-form .btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }
        
        .login-footer {
            text-align: center;
            padding: 20px 32px;
            background: #f8fafc;
            border-top: 1px solid var(--border-light);
        }
        
        .language-select {
            padding: 10px 16px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            background: var(--white);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .language-select:focus {
            border-color: var(--aragon-red);
            outline: none;
        }
        
        #mensaje-login,
        #mensaje-registro {
            margin-top: 12px;
            text-align: center;
            font-weight: 600;
        }
        
        #mensaje-login {
            color: #dc2626;
        }
        
        #mensaje-registro {
            color: #ea580c;
        }
        
        .clock-display {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            background: var(--white);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }
        
        .clock-display .date {
            font-size: 0.8rem;
            color: var(--text-gray);
        }
        
        .clock-display .time {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--aragon-red);
        }
        
        @media (max-width: 480px) {
            .login-card {
                border-radius: var(--radius-md);
            }
            
            .login-header {
                padding: 24px;
            }
            
            .login-body {
                padding: 24px;
            }
        }
    </style>
</head>
<body class="login-container" style="position: relative;">
    <!-- Reloj -->
    <div class="clock-display">
        <div id="reloj-fecha" class="date">Cargando...</div>
        <div id="reloj-hora" class="time">--:--:--</div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <img src="favicons/android-chrome-192x192.png" alt="Logo" class="login-logo">
            <h1 class="login-title" data-i18n="login:app_name">ARAGON Smart Inventories</h1>
            <p class="login-subtitle" data-i18n="login:app_subtitle">Sistema de Gestión de Inventarios</p>
        </div>
        
        <div class="login-body">
            <!-- Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" id="tab-login">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    <span data-i18n="login:login_tab">Iniciar Sesión</span>
                </button>
                <button class="login-tab" id="tab-register">
                    <i class="fa-solid fa-user-plus"></i>
                    <span data-i18n="login:register_tab">Registrarse</span>
                </button>
            </div>
            
            <!-- Formulario Login -->
            <form id="login-form" class="login-form active">
                <div class="form-group">
                    <input type="text" name="id_personal" data-i18n="[placeholder]login:username_label" placeholder="ID Personal" required>
                </div>
                <div class="form-group">
                    <input type="password" name="contrasena" data-i18n="[placeholder]login:password_label" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-sign-in-alt"></i>
                    <span data-i18n="login:login_button">Ingresar</span>
                </button>
                <div id="mensaje-login"></div>
            </form>
            
            <!-- Formulario Registro -->
            <form id="register-form" class="login-form">
                <div class="form-group">
                    <input type="text" name="nombre_real" data-i18n="[placeholder]login:name_label" placeholder="Nombre Completo" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email_usuario" data-i18n="[placeholder]login:email_label" placeholder="Correo Electrónico" required>
                </div>
                <div class="form-group">
                    <input type="text" name="nombre_empresa" data-i18n="[placeholder]login:company_label" placeholder="Nombre de la Empresa" required>
                </div>
                <div class="form-group">
                    <input type="text" name="nombre_usuario" data-i18n="[placeholder]login:username_label" placeholder="ID Personal" required>
                </div>
                <div class="form-group">
                    <input type="password" name="contrasena" data-i18n="[placeholder]login:password_label" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-user-plus"></i>
                    <span data-i18n="login:register_button">Crear Cuenta</span>
                </button>
                <div id="mensaje-registro"></div>
            </form>
        </div>
        
        <div class="login-footer">
            <select id="language-switcher" class="language-select">
                <option value="es" selected>Español</option>
                <option value="en">English</option>
                <option value="pap">Papiamento</option>
                <option value="zh">中文</option>
            </select>
        </div>
    </div>

    <script>
        // Actualizar reloj
        function actualizarReloj() {
            const ahora = new Date();
            const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const opcionesHora = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('reloj-fecha').textContent = ahora.toLocaleDateString('es-ES', opcionesFecha);
            document.getElementById('reloj-hora').textContent = ahora.toLocaleTimeString('es-ES', opcionesHora);
        }
        actualizarReloj();
        setInterval(actualizarReloj, 1000);

        // Tabs functionality
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formLogin = document.getElementById('login-form');
        const formRegister = document.getElementById('register-form');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            formLogin.classList.add('active');
            formRegister.classList.remove('active');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            formRegister.classList.add('active');
            formLogin.classList.remove('active');
        });
    </script>
    
    <script type="importmap">
    {
      "imports": {
        "i18next": "https://cdn.jsdelivr.net/npm/i18next@23.11.5/+esm",
        "i18next-http-backend": "https://cdn.jsdelivr.net/npm/i18next-http-backend@2.5.2/+esm",
        "i18next-browser-languagedetector": "https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@8.0.0/+esm",
        "sweetalert2": "https://cdn.jsdelivr.net/npm/sweetalert2@11.10.8/+esm"
      }
    }
    </script>
    
    <script src="js/i18n.js" type="module"></script>
    <script src="js/script.js" type="module"></script>
    <script src="js/common.js" type="module"></script>
</body>
</html>
