<!-- Main Container para el contenido de subida -->
 <main>
 <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-2xl relative">

 <!-- Título principal -->
 <h1 class="text-3xl font-bold text-center text-gray-800 mb-6" data-i18n="importar:form_title">Subir Productos</h1>

 <!-- Formulario de carga de archivo -->
 <form id="upload-form" class="space-y-6">
<div>
<label for="excel-file" class="block text-sm font-medium text-gray-700" data-i18n="importar:label_file_input">Selecciona tu archivo Excel (.xlsx):</label>
<input type="file" id="excel-file" accept=".xlsx, .xls" required class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-blue-100">
</div>

<button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out" data-i18n="importar:button_process_upload">
Procesar y Subir
 </button>
 </form>

 <!-- Contenedor para mostrar mensajes y datos procesados -->
 <div class="mt-6">
<h2 class="text-xl font-bold text-gray-800" data-i18n="importar:section_result_title">Resultado:</h2>
<div id="status-message" class="text-center font-bold mt-2"></div>
 </div>
 </div>
</main>

<!-- Librería para leer archivos Excel en el navegador -->

 <script type="importmap">
{
  "imports": {

  }
}
</script>
 
<div id="modal-progreso" class="modal-carga" style="display:none;">
    <div class="modal-contenido">
        <div class="loader-icon">🚀</div>
        <h3 data-i18n="importar:modal_title">Procesando Inventario Masivo</h3>
        <p id="texto-progreso">Iniciando lectura de registros...</p>
        
        <div class="barra-contenedor">
            <div id="barra-llenado" class="barra-llenado"></div>
        </div>
        
        <div class="flex-status">
            <span id="porcentaje-texto">0%</span>
            <span id="detalles-conteo">0 / 0</span>
        </div>
    </div>
</div>
